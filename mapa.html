<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cómo llegar</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600&family=Montserrat:wght@300;400&display=swap" rel="stylesheet">
<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  body {
    background: transparent;
    font-family: 'Montserrat', sans-serif;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    padding: 32px 20px 40px;
  }

  .container {
    text-align: center;
    width: 100%;
    max-width: 680px;
  }

  h2 {
    font-family: 'Cormorant Garamond', serif;
    font-size: 32px;
    font-weight: 600;
    color: #6B7D6A;
    margin-bottom: 10px;
    line-height: 1.2;
  }

  .address {
    font-family: 'Montserrat', sans-serif;
    font-size: 12px;
    font-weight: 300;
    color: #888;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    margin-bottom: 24px;
  }

  .map-wrapper {
    width: 100%;
    border-radius: 8px;
    overflow: hidden;
    box-shadow: 0 4px 20px rgba(0, 0, 0, 0.10);
    margin-bottom: 24px;
    line-height: 0;
  }

  .map-wrapper iframe {
    width: 100%;
    height: 350px;
    border: none;
    display: block;
  }

  .btn-maps {
    display: inline-block;
    font-family: 'Montserrat', sans-serif;
    font-size: 11px;
    font-weight: 400;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: #6B7D6A;
    background: transparent;
    border: 1.5px solid #6B7D6A;
    padding: 12px 28px;
    border-radius: 3px;
    text-decoration: none;
    cursor: pointer;
    transition: background 0.25s ease, color 0.25s ease;
  }

  .btn-maps:hover {
    background: #6B7D6A;
    color: #fff;
  }

  @media (max-width: 600px) {
    body {
      padding: 24px 16px 32px;
    }

    h2 {
      font-size: 26px;
    }

    .address {
      font-size: 11px;
      letter-spacing: 1px;
    }

    .map-wrapper iframe {
      height: 260px;
    }

    .btn-maps {
      font-size: 10px;
      padding: 10px 22px;
    }
  }
</style>
</head>
<body>
  <div class="container">
    <h2>¿Cómo llegar?</h2>
    <p class="address">Combate de Pavón 1695, B1686 Hurlingham, Provincia de Buenos Aires</p>

    <div class="map-wrapper">
      <iframe
        src="https://maps.google.com/maps?q=Combate+de+Pav%C3%B3n+1695,+B1686+Hurlingham,+Provincia+de+Buenos+Aires&output=embed&hl=es"
        width="100%"
        height="350"
        frameborder="0"
        allowfullscreen=""
        loading="lazy"
        referrerpolicy="no-referrer-when-downgrade"
        title="Ubicación del lugar de la boda">
      </iframe>
    </div>

    <a
      class="btn-maps"
      href="https://maps.google.com/?q=Combate+de+Pav%C3%B3n+1695,+B1686+Hurlingham,+Provincia+de+Buenos+Aires"
      target="_blank"
      rel="noopener noreferrer">
      Abrir en Google Maps
    </a>
  </div>
</body>
</html>
