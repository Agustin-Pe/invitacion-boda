<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Cuenta regresiva</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600&family=Montserrat:wght@300;400&display=swap" rel="stylesheet">

<style>

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  background: transparent;
  font-family: 'Montserrat', sans-serif;
  display: flex;
  justify-content: center;
  align-items: center;
  padding: 20px;
}

.container {
  width: 100%;
  text-align: center;
}

h2 {
  font-family: 'Cormorant Garamond', serif;
  font-size: 32px;
  font-weight: 600;
  color: #6B7D6A;
  margin-bottom: 30px;
  line-height: 1.3;
}

.countdown {
  display: flex;
  gap: 35px;
  justify-content: center;
  align-items: center;
  flex-wrap: wrap;
}

.item {
  min-width: 90px;
}

.number {
  font-family: 'Cormorant Garamond', serif;
  font-size: 64px;
  color: #333;
  line-height: 1;
}

.label {
  margin-top: 8px;
  text-transform: uppercase;
  letter-spacing: 2px;
  font-size: 12px;
  color: #888;
}

/* Contenedor del botón de música */

.music-container {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  margin-top: 32px;
}

/* Botón de música */

#music-btn {
  width: 56px;
  height: 56px;
  border-radius: 50%;
  background: rgba(107, 125, 106, 0.15);
  border: 1.5px solid rgba(107, 125, 106, 0.5);
  color: #6B7D6A;
  cursor: pointer;

  display: flex;
  align-items: center;
  justify-content: center;

  transition:
    background 0.3s ease,
    border-color 0.3s ease,
    transform 0.2s ease;

  backdrop-filter: blur(6px);
  -webkit-backdrop-filter: blur(6px);

  outline: none;

  box-shadow:
    0 4px 18px rgba(107, 125, 106, 0.18);
}

#music-btn:hover {
  background: rgba(107, 125, 106, 0.28);
  border-color: rgba(107, 125, 106, 0.8);
  transform: scale(1.07);
}

#music-btn:active {
  transform: scale(0.95);
}

/* Animación mientras suena */

#music-btn.playing {
  animation: pulse-ring 2.4s ease-out infinite;
}

@keyframes pulse-ring {

  0% {
    box-shadow:
      0 0 0 0 rgba(107, 125, 106, 0.35),
      0 4px 18px rgba(107, 125, 106, 0.18);
  }

  70% {
    box-shadow:
      0 0 0 10px rgba(107, 125, 106, 0),
      0 4px 18px rgba(107, 125, 106, 0.18);
  }

  100% {
    box-shadow:
      0 0 0 0 rgba(107, 125, 106, 0),
      0 4px 18px rgba(107, 125, 106, 0.18);
  }

}

/* Texto debajo del botón */

.music-text {
  margin-top: 10px;
  font-size: 10px;
  font-weight: 300;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  color: #888;
}

/* Versión celular */

@media (max-width: 700px) {

  body {
    padding: 8px;
  }

  h2 {
    font-size: 18px;
    margin-bottom: 14px;
  }

  .countdown {
    gap: 10px;
    flex-wrap: nowrap;
  }

  .item {
    min-width: 55px;
  }

  .number {
    font-size: 32px;
  }

  .label {
    font-size: 9px;
    letter-spacing: 1px;
    margin-top: 5px;
  }

  .music-container {
    margin-top: 22px;
  }

  #music-btn {
    width: 48px;
    height: 48px;
  }

  .music-text {
    font-size: 9px;
  }

}

</style>
</head>

<body>

<div class="container">

  <h2>
    El tiempo nos trajo hasta aquí. Ahora solo falta compartir este día con vos.
  </h2>

  <div class="countdown">

    <div class="item">
      <div class="number" id="days">0</div>
      <div class="label">Días</div>
    </div>

    <div class="item">
      <div class="number" id="hours">0</div>
      <div class="label">Horas</div>
    </div>

    <div class="item">
      <div class="number" id="minutes">0</div>
      <div class="label">Minutos</div>
    </div>

    <div class="item">
      <div class="number" id="seconds">0</div>
      <div class="label">Segundos</div>
    </div>

  </div>

  <div class="music-container">

    <button
      id="music-btn"
      type="button"
      aria-label="Reproducir música"
      title="Reproducir música"
    >

      <!-- Ícono de música -->

      <svg
        id="icon-play"
        xmlns="http://www.w3.org/2000/svg"
        width="23"
        height="23"
        viewBox="0 0 24 24"
        fill="currentColor"
        aria-hidden="true"
      >
        <path d="M9 3v12.174A3 3 0 1 0 11 18V7h6V3H9z"/>
      </svg>

      <!-- Ícono de pausa -->

      <svg
        id="icon-pause"
        xmlns="http://www.w3.org/2000/svg"
        width="20"
        height="20"
        viewBox="0 0 24 24"
        fill="currentColor"
        aria-hidden="true"
        style="display:none;"
      >
        <path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>
      </svg>

    </button>

    <div class="music-text" id="music-text">
      Tocá para escuchar
    </div>

  </div>

</div>

<!-- Música -->

<audio id="bg-audio" loop preload="auto" playsinline>

  <source
    src="https://raw.githubusercontent.com/Agustin-Pe/invitacion-boda/main/Me-haces-bien-boda.mp3"
    type="audio/mpeg"
  >

  Tu navegador no soporta la reproducción de audio.

</audio>

<script>

/* Cuenta regresiva */

const weddingDate = new Date("2026-11-07T17:00:00-03:00");

function updateCountdown() {

  const now = new Date();
  const diff = weddingDate - now;

  if (diff <= 0) {

    document.querySelector(".container").innerHTML =
      "<h2>¡Llegó el gran día! ❤️</h2>";

    return;

  }

  const days = Math.floor(
    diff / (1000 * 60 * 60 * 24)
  );

  const hours = Math.floor(
    (diff % (1000 * 60 * 60 * 24)) /
    (1000 * 60 * 60)
  );

  const minutes = Math.floor(
    (diff % (1000 * 60 * 60)) /
    (1000 * 60)
  );

  const seconds = Math.floor(
    (diff % (1000 * 60)) /
    1000
  );

  document.getElementById("days").textContent = days;
  document.getElementById("hours").textContent = hours;
  document.getElementById("minutes").textContent = minutes;
  document.getElementById("seconds").textContent = seconds;

}

updateCountdown();

setInterval(updateCountdown, 1000);


/* Reproductor de música */

const audio = document.getElementById("bg-audio");

const musicButton =
  document.getElementById("music-btn");

const playIcon =
  document.getElementById("icon-play");

const pauseIcon =
  document.getElementById("icon-pause");

const musicText =
  document.getElementById("music-text");

/* Volumen inicial */

audio.volume = 0.45;


/* Actualiza el aspecto del botón */

function setPlayingState(isPlaying) {

  if (isPlaying) {

    playIcon.style.display = "none";
    pauseIcon.style.display = "block";

    musicButton.classList.add("playing");

    musicButton.setAttribute(
      "aria-label",
      "Pausar música"
    );

    musicButton.title = "Pausar música";

    musicText.textContent = "Pausar música";

  } else {

    playIcon.style.display = "block";
    pauseIcon.style.display = "none";

    musicButton.classList.remove("playing");

    musicButton.setAttribute(
      "aria-label",
      "Reproducir música"
    );

    musicButton.title = "Reproducir música";

    musicText.textContent = "Tocá para escuchar";

  }

}


/* Botón reproducir y pausar */

musicButton.addEventListener("click", function () {

  if (audio.paused) {

    audio.play()
      .then(function () {

        setPlayingState(true);

      })
      .catch(function (error) {

        console.log(
          "No se pudo reproducir el audio:",
          error
        );

      });

  } else {

    audio.pause();

    setPlayingState(false);

  }

});


/* Mantener el botón sincronizado */

audio.addEventListener("play", function () {

  setPlayingState(true);

});

audio.addEventListener("pause", function () {

  setPlayingState(false);

});

audio.addEventListener("error", function () {

  musicText.textContent =
    "No se pudo cargar la música";

  musicButton.classList.remove("playing");

});

</script>

</body>
</html>
