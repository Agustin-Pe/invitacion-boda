<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Cuenta regresiva</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600&family=Montserrat:wght@300;400&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{

    background:transparent;
    font-family:'Montserrat',sans-serif;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;
}

.container{

    text-align:center;
}

h2{

    font-family:'Cormorant Garamond',serif;
    font-size:32px;
    font-weight:600;
    color:#6B7D6A;
    margin-bottom:30px;
}

.countdown{

    display:flex;
    gap:35px;
    justify-content:center;
    flex-wrap:wrap;
}

.item{

    min-width:90px;
}

.number{

    font-family:'Cormorant Garamond',serif;
    font-size:64px;
    color:#333;
    line-height:1;
}

.label{

    margin-top:8px;
    text-transform:uppercase;
    letter-spacing:2px;
    font-size:12px;
    color:#888;
}

@media(max-width:700px){

.number{

    font-size:44px;
}

.countdown{

    gap:18px;
}

.item{

    min-width:65px;
}

}

</style>

</head>

<body>

<div class="container">

<h2>El tiempo nos trajo hasta aquí.
Ahora solo falta compartir este día con vos.</h2>

<div class="countdown">

<div class="item">
<div class="number" id="days">0</div>
<div class="label">Días</div>
</div>

<div class="item">
<div class="number" id="hours">0</div>
<div class="label">Horas</div>
</div>

<div class="item">
<div class="number" id="minutes">0</div>
<div class="label">Minutos</div>
</div>

<div class="item">
<div class="number" id="seconds">0</div>
<div class="label">Segundos</div>
</div>

</div>

</div>

<script>

const weddingDate = new Date("2026-11-07T17:00:00-03:00");

function updateCountdown(){

const now = new Date();

const diff = weddingDate - now;

if(diff <= 0){

document.querySelector(".container").innerHTML="<h2>¡Llegó el gran día! ❤️</h2>";

return;

}

const days = Math.floor(diff / (1000*60*60*24));

const hours = Math.floor((diff%(1000*60*60*24))/(1000*60*60));

const minutes = Math.floor((diff%(1000*60*60))/(1000*60));

const seconds = Math.floor((diff%(1000*60))/1000);

document.getElementById("days").textContent = days;
document.getElementById("hours").textContent = hours;
document.getElementById("minutes").textContent = minutes;
document.getElementById("seconds").textContent = seconds;

}

updateCountdown();

setInterval(updateCountdown,1000);

</script>

</body>
</html>
